  <style>
    /* Global resets and typography */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    html, body {
      min-height: 100%;
    }
    
    body {
      background-color: #121212;
      color: #e0e0e0;
      position: relative;
    }
    
    /* Wrapper to handle footer placement */
    .wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .container {
      flex: 1;
      display: flex;
    }
    
    /* Sidebar styling */
    .sidebar {
      width: 320px;
      background-color: #1a1a1a;
      padding: 30px 25px;
      overflow-y: auto;
      border-right: 3px solid var(--bar-color, crimson); /* initial color */
      transition: border-color 2s ease;
    }
    
    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin: 0 auto 30px;
      display: block;
      border: 3px solid var(--bar-color, crimson);
      box-shadow: 0 0 20px rgba(220,20,60,0.2);
    }
    
    .sidebar h2 {
      color: #ffffff;
      font-size: 1.8rem;
      text-align: center;
      margin: 25px 0;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(220,20,60,0.3);
      position: relative;
    }
    
    .sidebar h2:after {
      content: '';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 80%;
      background-color: var(--bar-color, crimson);
      transition: background-color 2s ease;
    }
    
    .sidebar .bio {
      color: #d0d0d0;
      line-height: 1.8;
      margin: 30px 0;
      padding: 20px;
      background: #252525;
      border-radius: 8px;
      border-left: 3px solid var(--bar-color, crimson);
      position: relative;
    }
    
    .sidebar .bio .title {
      border-bottom: 1px solid var(--bar-color, crimson);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    
    .sidebar h3 {
      color: var(--bar-color, crimson);
      margin: 35px 0 25px;
      font-size: 1.3rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 2s ease;
    }
    
    .social-links {
      list-style: none;
      margin: 25px 0;
    }
    
    .social-links li {
      margin: 18px 0;
      padding: 15px;
      background: #252525;
      border-radius: 6px;
      transition: all 0.3s ease;
      border: 1px solid #333;
    }
    
    .social-links li:hover {
      transform: translateX(8px);
      border-left: 3px solid var(--bar-color, crimson);
      background: #2d2d2d;
      transition: border-color 2s ease;
    }
    
    /* Main content area */
    .main-content {
      flex: 1;
      padding: 50px;
      background-color: #181818;
    }
    
    /* Container to center posts */
    .posts-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .post-entry {
      margin-bottom: 35px;
      padding: 25px;
      background-color: #252525;
      border-radius: 6px;
      transition: all 0.3s ease;
      border-left: 4px solid var(--bar-color, crimson);
      transition: border-color 2s ease;
    }
    
    .post-entry:hover {
      transform: translateX(10px);
      border-left-color: #b01030;
    }
    
    .post-title {
      color: #ffffff;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }
    
    .post-description {
      color: #d0d0d0;
      line-height: 1.8;
      font-size: 1.05rem;
    }
    
    /* Pagination buttons styled in crimson */
    .pagination {
      margin-top: 50px;
      display: flex;
      justify-content: center;
      gap: 25px;
    }
    
    .page-btn {
      padding: 12px 30px;
      background-color: var(--bar-color, crimson);
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.3s ease;
      font-weight: 600;
      transition: background-color 2s ease;
    }
    
    .page-btn:hover {
      background-color: #b01030;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(220,20,60,0.4);
    }
    
    /* Footer styling */
    .footer-bar {
      height: 80px;
      background: var(--bar-color, crimson); /* initial color */
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-style: italic;
      letter-spacing: 1.5px;
      font-size: 1.1rem;
      border-top: 3px solid var(--bar-color, crimson);
      transition: border-color 2s ease, background-color 2s ease;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 3px solid var(--bar-color, crimson);
      }
      
      .main-content {
        padding: 30px 20px;
      }
      
      .footer-bar {
        height: 60px;
      }
    }
  </style>
</head>

  <!-- JavaScript for animated borders -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const colors = [
        "crimson", "#DC143C", "#C71585", "#8A2BE2", "purple"
      ];
      let index = 0;
      const updateBorders = () => {
        index = (index + 1) % colors.length;
        const newColor = colors[index];
        document.documentElement.style.setProperty('--bar-color', newColor);
      };
      setInterval(updateBorders, 4000); // change color every 4 seconds
    });
  </script>
